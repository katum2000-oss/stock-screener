<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockScreener JP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#04090f;--card:#080f1c;--hover:#0d1628;--border:#142030;--borderHi:#1e3050;
    --gold:#e8a020;--teal:#00c8a0;--text:#c8d8f0;--muted:#4a6080;--dim:#2a3850;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:13px;min-height:100vh;}
  #header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  #logo{width:34px;height:34px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#000;font-family:monospace;flex-shrink:0;}
  #header-title{font-weight:700;font-size:15px;}
  #header-sub{color:var(--muted);font-size:10px;margin-top:2px;}
  #dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);}
  #updated{color:var(--muted);font-size:11px;}
  #layout{display:flex;min-height:calc(100vh - 57px);}
  #sidebar{width:215px;background:var(--card);border-right:1px solid var(--border);padding:18px;flex-shrink:0;overflow-y:auto;}
  .sidebar-title{color:var(--gold);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .slider-wrap{margin-bottom:18px;}
  .slider-label{display:flex;justify-content:space-between;margin-bottom:5px;}
  .slider-name{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;}
  .slider-val{color:var(--gold);font-size:12px;font-family:monospace;font-weight:700;}
  input[type=range]{width:100%;accent-color:var(--gold);cursor:pointer;}
  .slider-range{display:flex;justify-content:space-between;margin-top:3px;color:var(--dim);font-size:9px;}
  .fin-note{background:#0a1c0f;border:1px solid #1c3820;border-radius:4px;padding:8px 10px;font-size:10px;color:#48a060;line-height:1.7;margin-bottom:20px;}
  .sec-title{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-top:14px;border-top:1px solid var(--border);}
  .sec-btn{width:100%;padding:5px 10px;margin-bottom:3px;text-align:left;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;font-size:11px;transition:.15s;}
  .sec-btn.active{background:#2a1e08;border-color:rgba(232,160,32,.5);color:var(--gold);}
  .sec-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;}
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  #summary{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
  .sum-card{background:var(--card);padding:14px 18px;}
  .sum-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
  .sum-val{display:flex;align-items:baseline;gap:3px;}
  .sum-num{font-size:26px;font-weight:700;font-family:monospace;line-height:1;}
  .sum-unit{font-size:13px;}
  .sum-sub{color:var(--dim);font-size:10px;margin-top:4px;}
  #table-wrap{flex:1;overflow:auto;}
  table{width:100%;border-collapse:collapse;}
  th{padding:10px 12px;text-align:right;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;z-index:1;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);background:var(--card);font-weight:400;}
  th.left{text-align:left;}
  th.active{color:var(--gold);font-weight:700;}
  tr.data-row{cursor:pointer;}
  tr.even td{background:#060b14;}
  tr.odd td{background:var(--bg);}
  tr.data-row:hover td{background:var(--hover);}
  tr.data-row.expanded td{background:var(--card);border-bottom:none;}
  td{padding:11px 12px;border-bottom:1px solid var(--border);}
  td.right{text-align:right;font-family:monospace;}
  .code{color:var(--gold);font-family:monospace;font-size:12px;font-weight:700;min-width:38px;display:inline-block;}
  .fin-tag{background:#142030;border:1px solid #1e3050;color:#5580aa;font-size:9px;padding:1px 5px;border-radius:2px;margin-left:6px;}
  .sec-tag{background:var(--border);font-size:11px;padding:2px 7px;border-radius:2px;}
  .score-bar-wrap{display:inline-flex;align-items:center;gap:8px;}
  .score-bar-bg{width:44px;height:3px;background:var(--dim);border-radius:2px;}
  .score-bar-fill{height:100%;border-radius:2px;}
  .score-num{font-family:monospace;font-weight:700;min-width:22px;text-align:right;}
  .expand-icon{color:var(--muted);font-size:10px;margin-right:6px;display:inline-block;transition:transform .2s;}
  .expanded .expand-icon{transform:rotate(90deg);color:var(--gold);}
  .empty{padding:60px;text-align:center;color:var(--muted);}

  /* 詳細パネル */
  tr.detail-row td{padding:0;border-bottom:1px solid var(--borderHi);}
  .detail-panel{padding:16px 20px;background:#050c18;border-top:1px solid var(--borderHi);}
  .detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px;}
  .chart-title{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .no-data{color:var(--dim);font-size:11px;text-align:center;padding:30px 0;}
  .detail-kpi{display:flex;align-items:center;gap:24px;margin-bottom:16px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:6px;flex-wrap:wrap;}
  .kpi-item{text-align:center;}
  .kpi-label{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
  .kpi-val{font-family:monospace;font-size:16px;font-weight:700;}

  #chart-area{background:var(--card);border-top:1px solid var(--border);padding:14px 20px;}
  .chart-main-title{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  #loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:999;}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .hint{color:var(--dim);font-size:10px;padding:6px 12px;border-top:1px solid var(--border);text-align:center;}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <span style="color:var(--muted);font-size:12px;">データ読み込み中...</span>
</div>
<div id="header">
  <div style="display:flex;align-items:center;gap:12px">
    <div id="logo">¥</div>
    <div>
      <div id="header-title">StockScreener JP <span style="color:var(--muted);font-size:11px;font-weight:400">— 高配当・低PBR・安定株</span></div>
      <div id="header-sub">データソース: Yahoo Finance　·　毎週月曜 07:00 JST 自動更新 (GitHub Actions)</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:6px"><div id="dot"></div><span id="updated">読み込み中...</span></div>
</div>
<div id="layout">
  <div id="sidebar">
    <div class="sidebar-title">スクリーニング条件</div>
    <div id="sliders"></div>
    <div class="fin-note">⚠ 銀行・保険・金融株は<br>自己資本比率基準を自動除外</div>
    <div class="sec-title">セクター絞り込み</div>
    <div id="sec-btns"></div>
  </div>
  <div id="main">
    <div id="summary"></div>
    <div class="hint">▶ 行をクリックすると業績推移が展開されます</div>
    <div id="table-wrap">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
    <div id="chart-area">
      <div class="chart-main-title">セクター分布</div>
      <canvas id="chart" height="80"></canvas>
    </div>
  </div>
</div>
<script>
const SC={"銀行業":"#4488ff","卸売業":"#e8a020","鉄鋼業":"#909090","その他金融業":"#7799dd","医薬品・医療":"#44dd88","鉱業":"#bb9944","素材・化学":"#dd6644","非鉄金属":"#bbaa44","テクノロジー":"#44aadd","情報・通信業":"#44cc44","通信・メディア":"#44cc44","保険業":"#dd44aa","不動産":"#aa66cc","一般消費財":"#ffaa44","産業機械":"#aaaaff","生活必需品":"#88dd88","エネルギー":"#ffdd44","金融サービス":"#7799dd"};
const SLIDERS=[
  {key:"minYield",label:"配当利回り 最低",min:1,max:7,step:.1,unit:"%",def:2.0},
  {key:"maxPBR",  label:"PBR 上限",       min:.3,max:5.0,step:.1,unit:"倍",def:5.0},
  {key:"minROE",  label:"ROE 最低",       min:0,max:20,step:.5,unit:"%",def:0.0},
  {key:"minEquity",label:"自己資本比率 最低",min:0,max:60,step:5,unit:"%",def:0},
  {key:"minYears",label:"連続配当年数 最低",min:1,max:20,step:1,unit:"年",def:1},
];
let allStocks=[],filters={},sortField="score",sortDir="desc",secFilter=null,chartInst=null;
let expandedCode=null;
const miniCharts={};
SLIDERS.forEach(s=>{filters[s.key]=s.def;});

function calcScore(s){
  const pbr=max0((2.0-s.pbr)/2.0*25,s.pbr>0);
  const roe=Math.min(s.roe/15*20,20);
  return Math.round(Math.min(s.dividendYield/6*30,30)+pbr+roe+Math.min(s.continuousDividendYears/20*15,15)+(s.isFinancial?10:Math.min(s.equityRatio/60*10,10)));
}
function max0(v,cond){return cond?Math.max(0,v):5;}

function getFiltered(){
  return allStocks.filter(s=>
    s.dividendYield>=filters.minYield&&s.pbr<=filters.maxPBR&&s.roe>=filters.minROE&&
    (s.isFinancial||s.equityRatio>=filters.minEquity)&&s.continuousDividendYears>=filters.minYears&&
    (!secFilter||s.sector===secFilter)
  ).map(s=>({...s,score:calcScore(s)}))
  .sort((a,b)=>sortDir==="desc"?b[sortField]-a[sortField]:a[sortField]-b[sortField]);
}
function avg(arr,key){return arr.length?arr.reduce((s,r)=>s+r[key],0)/arr.length:0;}
function colorVal(val,lo,hi,inv=false){if(inv){if(val<=lo)return"#00c8a0";if(val<=hi)return"#c8d8f0";return"#4a6080";}if(val>=hi)return"#00c8a0";if(val>=lo)return"#c8d8f0";return"#4a6080";}
function scoreColor(s){return s>=70?"#00c8a0":s>=50?"#e8a020":"#4a6080";}

function buildSliders(){
  const wrap=document.getElementById("sliders");wrap.innerHTML="";
  SLIDERS.forEach(s=>{wrap.innerHTML+=`<div class="slider-wrap"><div class="slider-label"><span class="slider-name">${s.label}</span><span class="slider-val" id="sv-${s.key}">${filters[s.key]}${s.unit}</span></div><input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${filters[s.key]}" oninput="filters['${s.key}']=parseFloat(this.value);document.getElementById('sv-${s.key}').textContent=this.value+'${s.unit}';render()"><div class="slider-range"><span>${s.min}${s.unit}</span><span>${s.max}${s.unit}</span></div></div>`;});
}
function buildSecBtns(){
  const sectors=[...new Set(allStocks.map(s=>s.sector))];
  const wrap=document.getElementById("sec-btns");
  wrap.innerHTML=`<button class="sec-btn ${!secFilter?'active':''}" onclick="secFilter=null;updateSecBtns();render()">すべて</button>`;
  sectors.forEach(sec=>{wrap.innerHTML+=`<button class="sec-btn ${secFilter===sec?'active':''}" onclick="secFilter=secFilter==='${sec}'?null:'${sec}';updateSecBtns();render()"><span class="sec-dot" style="background:${SC[sec]||'#4a6080'}"></span>${sec}</button>`;});
}
function updateSecBtns(){
  document.querySelectorAll(".sec-btn").forEach((btn,i)=>{
    const sec=i===0?null:[...new Set(allStocks.map(s=>s.sector))][i-1];
    btn.classList.toggle("active",sec===secFilter);
  });
}
function buildHeader(){
  const cols=[{f:"code",l:"コード / 銘柄名",al:"left"},{f:"sector",l:"セクター",al:"left"},{f:"dividendYield",l:"配当利回り"},{f:"pbr",l:"PBR"},{f:"per",l:"PER"},{f:"roe",l:"ROE"},{f:"equityRatio",l:"自己資本比率"},{f:"continuousDividendYears",l:"連続配当"},{f:"score",l:"スコア"}];
  document.getElementById("thead").innerHTML="<tr>"+cols.map(c=>`<th class="${c.al==='left'?'left':''} ${sortField===c.f?'active':''}" onclick="sortField='${c.f}';sortDir=sortField==='${c.f}'&&sortDir==='desc'?'asc':'desc';sortField='${c.f}';render()">${c.l}${sortField===c.f?(sortDir==="desc"?" ▼":" ▲"):""}</th>`).join("")+"</tr>";
}
function renderSummary(rows){
  document.getElementById("summary").innerHTML=[
    {label:"ヒット銘柄数",val:rows.length,unit:"銘柄",sub:`全${allStocks.length}銘柄中`,c:"var(--gold)"},
    {label:"平均配当利回り",val:avg(rows,"dividendYield").toFixed(2),unit:"%",sub:"スクリーニング平均",c:"var(--teal)"},
    {label:"平均 PBR",val:avg(rows,"pbr").toFixed(2),unit:"倍",sub:"スクリーニング平均",c:"var(--teal)"},
    {label:"平均 ROE",val:avg(rows,"roe").toFixed(1),unit:"%",sub:"スクリーニング平均",c:"var(--teal)"},
  ].map(c=>`<div class="sum-card"><div class="sum-label">${c.label}</div><div class="sum-val"><span class="sum-num" style="color:${c.c}">${c.val}</span><span class="sum-unit" style="color:${c.c}88">${c.unit}</span></div><div class="sum-sub">${c.sub}</div></div>`).join("");
}

// ─── ミニチャート描画 ────────────────────
function makeChart(id, type, labels, datasets, yLabel){
  const el=document.getElementById(id);
  if(!el)return;
  if(miniCharts[id])miniCharts[id].destroy();
  miniCharts[id]=new Chart(el,{
    type,
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:datasets.length>1,labels:{color:"#4a6080",font:{size:9},boxWidth:10}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label||""}:${ctx.parsed.y??"-"}`}}},
      scales:{
        x:{ticks:{color:"#4a6080",font:{size:9}},grid:{display:false},border:{display:false}},
        y:{ticks:{color:"#4a6080",font:{size:9}},grid:{color:"#142030"},border:{display:false},title:{display:!!yLabel,text:yLabel,color:"#4a6080",font:{size:8}}},
      }
    }
  });
}

function renderDetailPanel(s){
  const h=s.history||{};
  const yrs=h.years||[];
  const hasData=yrs.length>0;

  // KPI行
  const kpis=[
    {label:"株価",val:`¥${s.price.toLocaleString()}`,c:"var(--text)"},
    {label:"配当利回り",val:`${s.dividendYield}%`,c:"var(--teal)"},
    {label:"年間配当",val:`¥${s.annualDividend}`,c:"var(--gold)"},
    {label:"PBR",val:`${s.pbr}x`,c:s.pbr<=1?"var(--teal)":"var(--text)"},
    {label:"PER",val:`${s.per}x`,c:"var(--text)"},
    {label:"ROE",val:`${s.roe}%`,c:s.roe>=10?"var(--teal)":"var(--text)"},
    {label:"連続配当",val:`${s.continuousDividendYears}年`,c:s.continuousDividendYears>=10?"var(--teal)":"var(--text)"},
  ];

  const kabutanUrl=`https://kabutan.jp/stock/?code=${s.code}`;
  const irUrl=`https://www.nikkei.com/nkd/company/kessan/?scode=${s.code}`;
  const yahooUrl=`https://finance.yahoo.co.jp/quote/${s.code}.T`;
  const edinetUrl=`https://disclosure2.edinet-fsa.go.jp/WZEK0040.aspx`;

  return `
  <div class="detail-panel">
    <div class="detail-kpi">
      ${kpis.map(k=>`<div class="kpi-item"><div class="kpi-label">${k.label}</div><div class="kpi-val" style="color:${k.c}">${k.val}</div></div>`).join("")}
      <div style="margin-left:auto;display:flex;flex-direction:column;gap:6px;justify-content:center;">
        <a href="${yahooUrl}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:6px;padding:5px 12px;background:#0a1c0f;border:1px solid #1c3820;border-radius:4px;color:#48a060;font-size:11px;text-decoration:none;white-space:nowrap;" onmouseover="this.style.borderColor='#44cc44';this.style.color='#66dd66'" onmouseout="this.style.borderColor='#1c3820';this.style.color='#48a060'">
          📈 Yahoo Finance 株価
        </a>
        <a href="${kabutanUrl}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:6px;padding:5px 12px;background:#0a1428;border:1px solid #1e3a6a;border-radius:4px;color:#5588cc;font-size:11px;text-decoration:none;white-space:nowrap;" onmouseover="this.style.borderColor='#4488ff';this.style.color='#88bbff'" onmouseout="this.style.borderColor='#1e3a6a';this.style.color='#5588cc'">
          📊 株探 銘柄情報
        </a>
        <a href="${irUrl}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:6px;padding:5px 12px;background:#1a0f08;border:1px solid #3a2010;border-radius:4px;color:#cc8844;font-size:11px;text-decoration:none;white-space:nowrap;" onmouseover="this.style.borderColor='#dd9944';this.style.color='#ffbb66'" onmouseout="this.style.borderColor='#3a2010';this.style.color='#cc8844'">
          📋 日経 決算情報
        </a>
        <a href="${edinetUrl}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:6px;padding:5px 12px;background:#1a0a1e;border:1px solid #3a1e5a;border-radius:4px;color:#aa66cc;font-size:11px;text-decoration:none;white-space:nowrap;" onmouseover="this.style.borderColor='#aa44dd';this.style.color='#cc88ee'" onmouseout="this.style.borderColor='#3a1e5a';this.style.color='#aa66cc'">
          📄 EDINET 有報検索
        </a>
      </div>
    </div>
    <div class="detail-grid">
      <div class="chart-card">
        <div class="chart-title">売上推移（十億円）・営業利益率（%・右軸）</div>
        ${hasData&&(h.revenue||[]).some(v=>v!=null)?`<div style="height:140px"><canvas id="ch-rev-${s.code}"></canvas></div>`:`<div class="no-data">データなし</div>`}
      </div>
      <div class="chart-card">
        <div class="chart-title">EPS・年間配当金推移（円）</div>
        ${hasData&&(h.eps||[]).some(v=>v!=null)||(h.dividend||[]).some(v=>v>0)?`<div style="height:140px"><canvas id="ch-eps-${s.code}"></canvas></div>`:`<div class="no-data">データなし</div>`}
      </div>
      <div class="chart-card">
        <div class="chart-title">営業利益推移（十億円）</div>
        ${hasData&&(h.operatingIncome||[]).some(v=>v!=null)?`<div style="height:140px"><canvas id="ch-op-${s.code}"></canvas></div>`:`<div class="no-data">データなし</div>`}
      </div>
      <div class="chart-card">
        <div class="chart-title">自己資本比率推移（%）</div>
        ${hasData&&(h.equityRatio||[]).some(v=>v!=null)?`<div style="height:140px"><canvas id="ch-eq-${s.code}"></canvas></div>`:`<div class="no-data">データなし</div>`}
      </div>
    </div>
  </div>`;
}

function drawMiniCharts(s){
  const h=s.history||{};
  const yrs=h.years||[];
  if(!yrs.length)return;

  // 売上 + 営業利益率（右軸）
  if((h.revenue||[]).some(v=>v!=null)){
    const opMargin = h.revenue.map((rev,i)=>{
      const op = (h.operatingIncome||[])[i];
      return (rev&&op&&rev>0) ? Math.round(op/rev*1000)/10 : null;
    });
    if(miniCharts[`ch-rev-${s.code}`]) miniCharts[`ch-rev-${s.code}`].destroy();
    miniCharts[`ch-rev-${s.code}`] = new Chart(document.getElementById(`ch-rev-${s.code}`),{
      data:{
        labels:yrs,
        datasets:[
          {type:"bar",label:"売上",data:h.revenue,backgroundColor:"#1e3a5f",borderColor:"#4488ff",borderWidth:1,borderRadius:2,yAxisID:"y",order:2},
          {type:"line",label:"営業利益率%",data:opMargin,borderColor:"#e8a020",backgroundColor:"transparent",borderWidth:2,pointRadius:4,pointBackgroundColor:"#e8a020",tension:.3,yAxisID:"y2",order:1,z:10},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,labels:{color:"#4a6080",font:{size:9},boxWidth:10}},tooltip:{callbacks:{label:ctx=>ctx.dataset.yAxisID==="y2"?`${ctx.dataset.label}:${ctx.parsed.y}%`:`${ctx.dataset.label}:${ctx.parsed.y}B`}}},
        scales:{
          x:{ticks:{color:"#4a6080",font:{size:9}},grid:{display:false},border:{display:false}},
          y:{ticks:{color:"#4488ff",font:{size:9}},grid:{color:"#142030"},border:{display:false},title:{display:true,text:"十億円",color:"#4488ff",font:{size:8}}},
          y2:{position:"right",ticks:{color:"#e8a020",font:{size:9},callback:v=>`${v}%`},grid:{display:false},border:{display:false},title:{display:true,text:"利益率%",color:"#e8a020",font:{size:8}}},
        }
      }
    });
  }
  // EPS・配当
  const hasEps=(h.eps||[]).some(v=>v!=null);
  const hasDiv=(h.dividend||[]).some(v=>v>0);
  if(hasEps||hasDiv){
    const ds=[];
    if(hasEps) ds.push({label:"EPS",data:h.eps,backgroundColor:"#1a3a2a",borderColor:"#00c8a0",borderWidth:1,borderRadius:2});
    if(hasDiv) ds.push({label:"配当",data:h.dividend,backgroundColor:"#2a1e08",borderColor:"#e8a020",borderWidth:1,borderRadius:2});
    makeChart(`ch-eps-${s.code}`,"bar",yrs,ds);
  }
  // 営業利益専用
  if((h.operatingIncome||[]).some(v=>v!=null)){
    makeChart(`ch-op-${s.code}`,"bar",yrs,[
      {label:"営業利益",data:h.operatingIncome,backgroundColor:"#1e2a1a",borderColor:"#44cc44",borderWidth:1,borderRadius:2},
    ]);
  }
  // 自己資本比率
  if((h.equityRatio||[]).some(v=>v!=null)){
    makeChart(`ch-eq-${s.code}`,"line",yrs,[
      {label:"自己資本比率%",data:h.equityRatio,borderColor:"#4488ff",backgroundColor:"rgba(68,136,255,.1)",borderWidth:2,fill:true,tension:.3,pointRadius:3},
    ]);
  }
}

function toggleDetail(code){
  if(expandedCode===code){
    expandedCode=null;
  } else {
    expandedCode=code;
  }
  renderTable(getFiltered());
}

function renderTable(rows){
  if(!rows.length){
    document.getElementById("tbody").innerHTML=`<tr><td colspan="9" class="empty">条件に合う銘柄がありません。フィルターを緩めてください。</td></tr>`;
    return;
  }
  let html="";
  rows.forEach((s,i)=>{
    const isExp=expandedCode===s.code;
    html+=`<tr class="data-row ${i%2===0?'even':'odd'} ${isExp?'expanded':''}" onclick="toggleDetail('${s.code}')">
      <td><span class="expand-icon">▶</span><span class="code">${s.code}</span>${s.name}${s.isFinancial?'<span class="fin-tag">金融</span>':''}</td>
      <td><span class="sec-tag" style="color:${SC[s.sector]||'#4a6080'}">${s.sector}</span></td>
      <td class="right" style="color:${colorVal(s.dividendYield,3.5,4.5)};font-weight:700">${s.dividendYield.toFixed(2)}%</td>
      <td class="right" style="color:${colorVal(s.pbr,.7,1.0,true)}">${s.pbr.toFixed(2)}x</td>
      <td class="right" style="color:var(--muted)">${s.per.toFixed(1)}x</td>
      <td class="right" style="color:${colorVal(s.roe,5,10)}">${s.roe.toFixed(1)}%</td>
      <td class="right">${s.isFinancial?'<span style="color:var(--dim);font-size:11px">金融基準</span>':`<span style="color:${colorVal(s.equityRatio,25,40)}">${s.equityRatio.toFixed(1)}%</span>`}</td>
      <td class="right" style="color:${colorVal(s.continuousDividendYears,3,10)}">${s.continuousDividendYears}年</td>
      <td class="right"><div class="score-bar-wrap"><div class="score-bar-bg"><div class="score-bar-fill" style="width:${s.score}%;background:${scoreColor(s.score)}"></div></div><span class="score-num" style="color:${scoreColor(s.score)}">${s.score}</span></div></td>
    </tr>`;
    if(isExp){
      html+=`<tr class="detail-row"><td colspan="9">${renderDetailPanel(s)}</td></tr>`;
    }
  });
  document.getElementById("tbody").innerHTML=html;

  // チャート描画（DOM生成後）
  if(expandedCode){
    const s=rows.find(r=>r.code===expandedCode);
    if(s) requestAnimationFrame(()=>drawMiniCharts(s));
  }
}

function renderChart(rows){
  const m={};rows.forEach(s=>{m[s.sector]=(m[s.sector]||0)+1;});
  const labels=Object.keys(m).sort((a,b)=>m[b]-m[a]);
  const data=labels.map(l=>m[l]);
  const colors=labels.map(l=>SC[l]||"#e8a020");
  if(chartInst)chartInst.destroy();
  chartInst=new Chart(document.getElementById("chart"),{type:"bar",data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:2}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}銘柄`}}},scales:{x:{ticks:{color:"#4a6080",font:{size:9}},grid:{display:false},border:{display:false}},y:{ticks:{color:"#4a6080",font:{size:9},stepSize:1},grid:{color:"#142030"},border:{display:false}}}}});
}

function render(){
  const rows=getFiltered();
  buildHeader();
  renderSummary(rows);
  renderTable(rows);
  renderChart(rows);
}

fetch("data/results.json")
  .then(r=>r.json())
  .then(data=>{
    allStocks=data.stocks||[];
    document.getElementById("updated").textContent="最終更新: "+(data.updatedAt||"不明");
    document.getElementById("loading").style.display="none";
    buildSliders();buildSecBtns();render();
  })
  .catch(err=>{
    document.getElementById("loading").innerHTML=`<div style="color:#ff4455;font-size:14px">データの読み込みに失敗しました</div><div style="color:var(--muted);font-size:11px;margin-top:8px">${err.message}</div>`;
  });
</script>
</body>
</html>
