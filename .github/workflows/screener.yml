name: 株式スクリーニング 自動実行

on:
  schedule:
    # 毎週月曜 07:00 JST（= 日曜 22:00 UTC）
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      min_yield:
        description: '配当利回り最低(%) デフォルト: 2.0'
        required: false
        default: '2.0'
      max_pbr:
        description: 'PBR上限(倍) デフォルト: 99'
        required: false
        default: '99.0'

jobs:
  screen:
    name: スクリーニング実行
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run screener
        env:
          MIN_YIELD: ${{ github.event.inputs.min_yield || '2.0' }}
          MAX_PBR:   ${{ github.event.inputs.max_pbr   || '99.0' }}
        run: python screener.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/results.json
          git diff --staged --quiet || \
            git commit -m "chore: スクリーニング結果更新 $(date +'%Y-%m-%d')"
          git push
